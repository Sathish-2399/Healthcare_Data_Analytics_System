<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gray-100">

<div class="p-6">

<h1 class="text-3xl font-bold text-center mb-6">Health Analysis Dashboard</h1>

<!-- Cards -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
  <div class="bg-white p-4 rounded shadow text-center">
    <h2>Total Records</h2>
    <p id="total" class="text-xl font-bold text-blue-500"></p>
  </div>

  <div class="bg-white p-4 rounded shadow text-center">
    <h2>Top Disease</h2>
    <p id="topDisease" class="text-xl font-bold text-red-500"></p>
  </div>

  <div class="bg-white p-4 rounded shadow text-center">
    <h2>Avg Age</h2>
    <p id="avgAge" class="text-xl font-bold text-green-500"></p>
  </div>
</div>

<!-- Charts -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

  <div class="bg-white p-4 rounded shadow h-[350px]">
    <h3>Disease Distribution</h3>
    <canvas id="diseaseChart"></canvas>
  </div>

  <div class="bg-white p-4 rounded shadow h-[350px]">
    <h3>Age Group Distribution</h3>
    <canvas id="ageChart"></canvas>
  </div>

  <div class="bg-white p-4 rounded shadow h-[350px]">
    <h3>Gender Distribution</h3>
    <canvas id="genderChart"></canvas>
  </div>

  <div class="bg-white p-4 rounded shadow h-[350px]">
    <h3>Disease vs Age Group</h3>
    <canvas id="combinedChart"></canvas>
  </div>

  <div class="bg-white p-4 rounded shadow h-[350px]">
    <h3>Disease vs Gender</h3>
    <canvas id="diseaseGenderChart"></canvas>
  </div>

  <div class="bg-white p-4 rounded shadow h-[350px]">
    <h3>Top 5 Diseases</h3>
    <canvas id="topDiseaseChart"></canvas>
  </div>

</div>

</div>

<script>

async function loadData() {
  const response = await fetch('Healthcare_Transformed.csv');
  const text = await response.text();

  const rows = text.split('\n').slice(1);

  let data = rows.map(row => {
    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
    if (!cols || cols.length < 7) return null;

    return {
      age: parseInt(cols[1]),
      gender: cols[2],
      disease: cols[5],
      ageGroup: cols[6]
    };
  }).filter(x => x);

  processData(data);
}

function processData(data){

  let diseases={}, ageGroups={}, genders={}, diseaseByAge={}, diseaseByGender={};
  let totalAge=0;

  data.forEach(d=>{
    totalAge+=d.age;

    diseases[d.disease]=(diseases[d.disease]||0)+1;
    ageGroups[d.ageGroup]=(ageGroups[d.ageGroup]||0)+1;
    genders[d.gender]=(genders[d.gender]||0)+1;

    if(!diseaseByAge[d.disease]) diseaseByAge[d.disease]={};
    diseaseByAge[d.disease][d.ageGroup]=(diseaseByAge[d.disease][d.ageGroup]||0)+1;

    if(!diseaseByGender[d.disease]) diseaseByGender[d.disease]={};
    diseaseByGender[d.disease][d.gender]=(diseaseByGender[d.disease][d.gender]||0)+1;
  });

  // Cards
  document.getElementById("total").innerText=data.length;
  document.getElementById("avgAge").innerText=Math.round(totalAge/data.length);

  const top = Object.keys(diseases).reduce((a,b)=>diseases[a]>diseases[b]?a:b);
  document.getElementById("topDisease").innerText=top;

  // Colors
  const colors = ["#3b82f6","#ef4444","#10b981","#f59e0b","#8b5cf6","#ec4899","#14b8a6","#f97316","#6366f1"];

  // Disease Chart
  new Chart(diseaseChart,{
    type:'bar',
    data:{
      labels:Object.keys(diseases),
      datasets:[{
        label:"Disease Count",   // ✅ FIX
        data:Object.values(diseases),
        backgroundColor:colors
      }]
    },
    options:{maintainAspectRatio:false}
  });

  // Age Chart
  new Chart(ageChart,{
    type:'pie',
    data:{
      labels:Object.keys(ageGroups),
      datasets:[{
        label:"Age Groups",   // ✅ FIX
        data:Object.values(ageGroups),
        backgroundColor:["#3b82f6","#22c55e","#f97316","#eab308"]
      }]
    },
    options:{maintainAspectRatio:false}
  });

  // Gender Chart
  new Chart(genderChart,{
    type:'doughnut',
    data:{
      labels:Object.keys(genders),
      datasets:[{
        label:"Gender Distribution",  // ✅ FIX
        data:Object.values(genders),
        backgroundColor:["#3b82f6","#ec4899","#8b5cf6"]
      }]
    },
    options:{maintainAspectRatio:false}
  });

  // Disease vs Age
  new Chart(combinedChart,{
    type:'bar',
    data:{
      labels:Object.keys(ageGroups),
      datasets:Object.keys(diseaseByAge).map((d,i)=>({
        label:d,
        data:Object.keys(ageGroups).map(a=>diseaseByAge[d][a]||0),
        backgroundColor:colors[i%colors.length]
      }))
    },
    options:{maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true}}}
  });

  // Disease vs Gender
  new Chart(diseaseGenderChart,{
    type:'bar',
    data:{
      labels:Object.keys(genders),
      datasets:Object.keys(diseaseByGender).map((d,i)=>({
        label:d,
        data:Object.keys(genders).map(g=>diseaseByGender[d][g]||0),
        backgroundColor:colors[i%colors.length]
      }))
    },
    options:{maintainAspectRatio:false}
  });

  // Top 5
  const sorted = Object.entries(diseases).sort((a,b)=>b[1]-a[1]).slice(0,5);

  new Chart(topDiseaseChart,{
    type:'bar',
    data:{
      labels:sorted.map(x=>x[0]),
      datasets:[{
        label:"Top Diseases",   // ✅ FIX
        data:sorted.map(x=>x[1]),
        backgroundColor:"#ef4444"
      }]
    },
    options:{maintainAspectRatio:false}
  });

}

loadData();

</script>

</body>
</html>
