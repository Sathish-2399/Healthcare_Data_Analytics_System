<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Healthcare Stream</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 8px;
        }

        .header p {
            color: #9ab;
            font-size: 14px;
        }

        .header a {
            color: #5bc0de;
            text-decoration: none;
            font-size: 14px;
        }

        .header a:hover { text-decoration: underline; }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 20px 30px;
            text-align: center;
            min-width: 160px;
            backdrop-filter: blur(10px);
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
        }

        .stat-card .label {
            font-size: 13px;
            color: #9ab;
            margin-top: 4px;
        }

        .stat-card.live .number { color: #28a745; }
        .stat-card.total .number { color: #5bc0de; }
        .stat-card.progress .number { color: #f0ad4e; font-size: 24px; }

        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .status-badge.streaming {
            background: rgba(40,167,69,0.2);
            color: #28a745;
            border: 1px solid rgba(40,167,69,0.4);
            animation: pulse 2s infinite;
        }

        .status-badge.completed {
            background: rgba(91,192,222,0.2);
            color: #5bc0de;
            border: 1px solid rgba(91,192,222,0.4);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .progress-bar-container {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            max-width: 600px;
            margin: 0 auto 30px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #5bc0de);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .latest-record {
            max-width: 700px;
            margin: 0 auto 30px;
            background: rgba(40,167,69,0.1);
            border: 1px solid rgba(40,167,69,0.3);
            border-radius: 12px;
            padding: 20px;
            animation: fadeSlide 0.5s ease;
        }

        .latest-record h3 {
            color: #28a745;
            margin-bottom: 12px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .latest-record .fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }

        .latest-record .field {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 10px;
        }

        .latest-record .field .key {
            font-size: 11px;
            color: #9ab;
            text-transform: uppercase;
        }

        .latest-record .field .value {
            font-size: 15px;
            color: #fff;
            margin-top: 2px;
            font-weight: 600;
        }

        .table-container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .table-container h3 {
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            font-size: 15px;
            color: #ccc;
        }

        .table-scroll {
            max-height: 400px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(255,255,255,0.08);
            padding: 10px 14px;
            text-align: left;
            font-size: 12px;
            color: #9ab;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
        }

        td {
            padding: 10px 14px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        tr:hover { background: rgba(255,255,255,0.03); }

        tr.new-row {
            animation: fadeSlide 0.5s ease;
            background: rgba(40,167,69,0.08);
        }

        .disease-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(91,192,222,0.15);
            color: #5bc0de;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .table-scroll::-webkit-scrollbar { width: 6px; }
        .table-scroll::-webkit-scrollbar-track { background: transparent; }
        .table-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Real-Time Healthcare Data Stream</h1>
    <p>Patient records streaming into MySQL every 10 seconds</p>
    <br>
    <a href="/">Back to Disease Prediction</a>
</div>

<div style="text-align:center;">
    <span id="statusBadge" class="status-badge streaming">STREAMING</span>
</div>

<div class="stats">
    <div class="stat-card live">
        <div class="number" id="insertedCount">0</div>
        <div class="label">Records Inserted</div>
    </div>
    <div class="stat-card total">
        <div class="number" id="totalCount">{{ total }}</div>
        <div class="label">Total in CSV</div>
    </div>
    <div class="stat-card progress">
        <div class="number" id="progressPct">0%</div>
        <div class="label">Progress</div>
    </div>
</div>

<div class="progress-bar-container">
    <div class="progress-bar-fill" id="progressBar"></div>
</div>

<div id="latestRecord" class="latest-record" style="display:none;">
    <h3>Latest Record Added</h3>
    <div class="fields" id="latestFields"></div>
</div>

<div class="table-container">
    <h3>Live Data Feed</h3>
    <div class="table-scroll" id="tableScroll">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Patient ID</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Symptoms</th>
                    <th>Disease</th>
                    <th>Age Group</th>
                </tr>
            </thead>
            <tbody id="dataBody"></tbody>
        </table>
    </div>
</div>

<script>
    
    const evtSource = new EventSource("/api/stream");

    evtSource.onmessage = function(event) {
        const data = JSON.parse(event.data);

        if (data.heartbeat) {
            updateStats(data.count, data.running);
            return;
        }

        const rec = data.record;
        updateStats(data.count, data.running);
        showLatestRecord(rec);
        addTableRow(rec, data.count);
    };

    evtSource.onerror = function() {
        const badge = document.getElementById("statusBadge");
        badge.textContent = "DISCONNECTED";
        badge.className = "status-badge completed";
    };

    function updateStats(count, running) {
        document.getElementById("insertedCount").textContent = count;
        const pct = Math.round((count / total) * 100);
        document.getElementById("progressPct").textContent = pct + "%";
        document.getElementById("progressBar").style.width = pct + "%";

        const badge = document.getElementById("statusBadge");
        if (!running && count >= total) {
            badge.textContent = "COMPLETED";
            badge.className = "status-badge completed";
        }
    }

    function showLatestRecord(rec) {
        const container = document.getElementById("latestRecord");
        container.style.display = "block";
        const fields = document.getElementById("latestFields");

        const display = {
            "Patient ID": rec.patient_id,
            "Age": rec.age,
            "Gender": rec.gender,
            "Symptoms": rec.symptoms,
            "Disease": rec.disease,
            "Age Group": rec.age_group
        };

        fields.innerHTML = "";
        for (const [key, val] of Object.entries(display)) {
            fields.innerHTML += `
                <div class="field">
                    <div class="key">${key}</div>
                    <div class="value">${val || '-'}</div>
                </div>`;
        }
    }

    function addTableRow(rec, count) {
        const tbody = document.getElementById("dataBody");
        const row = document.createElement("tr");
        row.className = "new-row";

        row.innerHTML = `
            <td>${count}</td>
            <td>${rec.patient_id || '-'}</td>
            <td>${rec.age || '-'}</td>
            <td>${rec.gender || '-'}</td>
            <td>${rec.symptoms || '-'}</td>
            <td><span class="disease-tag">${rec.disease || '-'}</span></td>
            <td>${rec.age_group || '-'}</td>
        `;

        tbody.insertBefore(row, tbody.firstChild);

        setTimeout(() => row.classList.remove("new-row"), 1000);

        const scroll = document.getElementById("tableScroll");
        scroll.scrollTop = 0;
    }
</script>

</body>
</html>
